<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MoesMan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="50%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset in="blur" dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000" flood-opacity="0.5"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Soft glow -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Manga speed-lines (subtle) -->
  <g opacity="0.08" stroke="#ffffff" stroke-linecap="round">
    <line x1="60" y1="120" x2="140" y2="120" stroke-width="2"/>
    <line x1="60" y1="150" x2="110" y2="150" stroke-width="2"/>
    <line x1="380" y1="400" x2="460" y2="400" stroke-width="2"/>
    <line x1="400" y1="430" x2="460" y2="430" stroke-width="2"/>
  </g>

  <!-- The "M" — built from two ascending peaks over a bold baseline -->
  <g filter="url(#innerShadow)">
    <!-- Left peak -->
    <path
      d="M 108 380
         L 108 160
         Q 108 132 136 132
         L 162 132
         Q 180 132 190 150
         L 256 280
         L 218 356
         Z"
      fill="url(#brand)"/>
    <!-- Right peak -->
    <path
      d="M 404 380
         L 404 160
         Q 404 132 376 132
         L 350 132
         Q 332 132 322 150
         L 256 280
         L 294 356
         Z"
      fill="url(#brand)"/>
    <!-- Center valley accent -->
    <path
      d="M 218 356
         L 256 280
         L 294 356
         Z"
      fill="url(#accent)"
      opacity="0.95"/>
  </g>

  <!-- Panel cut highlight (top-right, manga panel vibe) -->
  <path
    d="M 420 92 L 464 92 L 464 136"
    fill="none"
    stroke="url(#brand)"
    stroke-width="6"
    stroke-linecap="round"/>
  <!-- Panel cut (bottom-left) -->
  <path
    d="M 48 420 L 48 376 M 48 420 L 92 420"
    fill="none"
    stroke="url(#accent)"
    stroke-width="6"
    stroke-linecap="round"
    opacity="0.75"/>

  <!-- Dot accent -->
  <circle cx="256" cy="410" r="10" fill="url(#brand)"/>
</svg>
