<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MoesMan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#0a0a0e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9eb4"/>
      <stop offset="55%" stop-color="#f5356a"/>
      <stop offset="100%" stop-color="#ba0e44"/>
    </linearGradient>
  </defs>

  <!-- Rounded bg -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- Eagle / spread wings mark -->
  <g fill="url(#brand)">
    <!-- Head peak -->
    <path d="M32 13 L29.2 18 L34.8 18 Z"/>

    <!-- Right wing: three feather tiers -->
    <path d="M34.4 19 L57 17 L52 23 L38.2 24 Z"/>
    <path d="M34.2 24.4 L55 25.2 L47.8 30 L36.4 29 Z"/>
    <path d="M34.8 29.4 L49.5 32 L41.5 36 L36.4 34 Z"/>

    <!-- Left wing: mirror -->
    <path d="M29.6 19 L7 17 L12 23 L25.8 24 Z"/>
    <path d="M29.8 24.4 L9 25.2 L16.2 30 L27.6 29 Z"/>
    <path d="M29.2 29.4 L14.5 32 L22.5 36 L27.6 34 Z"/>

    <!-- Body + tail feathers -->
    <path d="M29.8 24 L29.8 39.5 L27 46.5 L32 51.5 L37 46.5 L34.2 39.5 L34.2 24 Z"/>
    <path d="M32 40 L31 47.5 L32 50.5 L33 47.5 Z" fill="rgba(0,0,0,0.18)"/>
  </g>
</svg>
