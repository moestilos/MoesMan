<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexión — Ako</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%;
        background: #0a0a0b;
        color: #fafafa;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: grid; place-items: center;
        background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(244, 63, 94, 0.10), transparent 60%);
      }
      main { text-align: center; padding: 2rem; max-width: 480px; }
      h1 { font-size: 2rem; font-weight: 800; margin: 0 0 0.5rem; }
      p { color: #a1a1aa; line-height: 1.5; }
      a {
        display: inline-flex; align-items: center; gap: 0.5rem;
        margin-top: 1.5rem;
        background: #e11d48; color: white;
        padding: 0.65rem 1.25rem; border-radius: 0.75rem;
        font-weight: 600; text-decoration: none;
        box-shadow: 0 0 40px -10px rgba(244, 63, 94, 0.45);
        transition: background 0.2s;
      }
      a:hover { background: #f43f5e; }
      .logo {
        width: 56px; height: 56px; margin: 0 auto 1rem;
        border-radius: 14px;
        background: linear-gradient(135deg, #f43f5e, #881337);
        display: grid; place-items: center;
        font-weight: 900; font-size: 1.75rem; color: white;
        box-shadow: 0 0 40px -10px rgba(244, 63, 94, 0.6);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">M</div>
      <h1>Sin conexión</h1>
      <p>No hay conexión a internet. Lo que hayas leído recientemente sigue cacheado — intenta abrirlo desde tu biblioteca o historial.</p>
      <a href="/library">Ir a mi biblioteca</a>
    </main>
  </body>
</html>
