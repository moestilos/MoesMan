name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    name: Build web (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  build-api:
    name: Build api (NestJS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
        working-directory: api
      - run: npm run build
        working-directory: api

  api-smoke:
    name: API smoke test (Postgres + migraciones)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: moesman
          POSTGRES_PASSWORD: moesman
          POSTGRES_DB: moesman
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moesman"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://moesman:moesman@localhost:5432/moesman
      JWT_SECRET: ci-test-secret
      PORT: 3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
        working-directory: api
      - run: npm run db:push
        working-directory: api
      - name: Arranque + ping
        working-directory: api
        run: |
          npm run build
          node dist/main.js &
          API_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/api/auth/me -o /dev/null; then break; fi
            if [ $i -eq 20 ]; then echo "API no arrancó"; exit 1; fi
            sleep 1
          done
          # /auth/me sin token debe devolver 401 (prueba que la app responde y el guard funciona)
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/auth/me)
          echo "auth/me sin token => $code"
          [ "$code" = "401" ] || { echo "esperado 401, obtenido $code"; kill $API_PID; exit 1; }
          kill $API_PID
